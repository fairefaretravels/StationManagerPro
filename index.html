<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STV · Station Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #0a0a0a;
    --surface:   #111115;
    --card:      #161618;
    --border:    #222228;
    --amber:     #E8A020;
    --amber-dim: #7a5210;
    --slate:     #8899AA;
    --muted:     #555566;
    --white:     #F0EEE8;
    --live-red:  #E03030;
    --head: 'Space Grotesk', sans-serif;
    --body: 'Inter', sans-serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--white); font-family: var(--body); overflow-x: hidden; }

  /* ── MASTHEAD ── */
  .masthead {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    padding: 13px 24px; border-bottom: 1px solid var(--border); background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: var(--head); font-weight: 700; font-size: 1.1rem; letter-spacing: .12em; text-transform: uppercase; }
  .logo span { color: var(--amber); }
  .live-badge { display: flex; align-items: center; gap: 6px; font-family: var(--head); font-size: .72rem; font-weight: 700; letter-spacing: .12em; color: var(--live-red); text-transform: uppercase; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--live-red); animation: blink 1.4s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
  .clock { font-family: var(--head); font-size: .82rem; color: var(--slate); letter-spacing: .05em; }

  /* ── SCHEDULE RAIL ── */
  .rail-wrap { background: var(--surface); border-bottom: 2px solid var(--border); padding: 10px 12px; overflow-x: auto; scrollbar-width: none; }
  .rail-wrap::-webkit-scrollbar { display: none; }
  .rail { display: flex; gap: 4px; min-width: max-content; }
  .block {
    display: flex; flex-direction: column; align-items: center;
    padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
    cursor: pointer; transition: all .16s; min-width: 72px;
  }
  .block .bhr { font-family: var(--head); font-size: .64rem; font-weight: 500; color: var(--muted); letter-spacing: .06em; margin-bottom: 3px; }
  .block .bname { font-family: var(--head); font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--slate); white-space: nowrap; }
  .block:hover { border-color: var(--amber-dim); background: #1a1510; }
  .block:hover .bname { color: var(--amber); }
  /* current hour */
  .block.now { background: var(--amber); border-color: var(--amber); }
  .block.now .bhr, .block.now .bname { color: #0a0a0a; }
  /* active tuned channel (may differ from current hour if manually overridden) */
  .block.tuned:not(.now) { border-color: var(--amber); }
  .block.tuned:not(.now) .bname { color: var(--amber); }

  /* ── NOW-ON-AIR BAR ── */
  .now-bar {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    background: var(--card);
  }
  .now-bar h2 { font-family: var(--head); font-size: 1.3rem; font-weight: 700; letter-spacing: .03em; }
  .ch-tag { font-family: var(--head); font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 3px 10px; border-radius: 4px; background: var(--amber); color: #0a0a0a; }
  .type-tag { font-family: var(--head); font-size: .7rem; letter-spacing: .08em; text-transform: uppercase; color: var(--slate); margin-left: auto; }
  .next-up { font-family: var(--head); font-size: .72rem; color: var(--muted); }
  .next-up span { color: var(--slate); }

  /* ── STAGE ── */
  .stage {
    width: 100%; height: calc(100vh - 210px); min-height: 360px;
    position: relative; background: #000;
  }
  .stage iframe {
    position: absolute; inset: 0; width: 100%; height: 100%;
    border: none; display: block;
  }
  .stage-loading {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: var(--bg); pointer-events: none; transition: opacity .4s;
  }
  .stage-loading.hidden { opacity: 0; }
  .stage-loading .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--amber); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .stage-loading p { font-family: var(--head); font-size: .8rem; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }

  /* ── VIDEO NAV (only shown for video channels) ── */
  .video-nav {
    display: none; align-items: center; justify-content: center; gap: 16px;
    padding: 12px; background: var(--surface); border-top: 1px solid var(--border);
  }
  .video-nav.visible { display: flex; }
  .vnav-btn { font-family: var(--head); font-size: .75rem; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; padding: 7px 20px; border-radius: 6px; border: 1px solid var(--border); color: var(--slate); background: var(--card); cursor: pointer; transition: all .15s; }
  .vnav-btn:hover { border-color: var(--amber); color: var(--amber); }
  .vnav-idx { font-family: var(--head); font-size: .75rem; color: var(--muted); }

  /* ── FOOTER ── */
  .footer {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    padding: 12px 24px; border-top: 1px solid var(--border); background: var(--surface);
    font-family: var(--head); font-size: .7rem; color: var(--muted); letter-spacing: .05em;
  }
  .embed-btn { font-family: var(--head); font-size: .7rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; padding: 6px 14px; border-radius: 5px; border: 1px solid var(--border); color: var(--slate); background: var(--card); cursor: pointer; transition: all .15s; }
  .embed-btn:hover { border-color: var(--amber); color: var(--amber); }
  .channel-dots { display: flex; gap: 8px; align-items: center; }
  .cdot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); cursor: pointer; transition: all .2s; }
  .cdot.active { background: var(--amber); transform: scale(1.3); }
  .cdot:hover { background: var(--amber-dim); }

  /* ── TOAST ── */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--amber); color: #0a0a0a; font-family: var(--head); font-size: .8rem; font-weight: 700; letter-spacing: .06em; padding: 10px 24px; border-radius: 8px; pointer-events: none; opacity: 0; transition: opacity .3s; z-index: 999; }
  .toast.show { opacity: 1; }

  @media (max-width: 600px) {
    .now-bar h2 { font-size: 1.1rem; }
    .type-tag, .next-up { display: none; }
    .stage { height: calc(100vh - 190px); }
  }
</style>
</head>
<body>

<!-- MASTHEAD -->
<header class="masthead">
  <div class="logo"><span>STV</span> · Station Manager</div>
  <div class="live-badge"><span class="live-dot"></span>On Air</div>
  <div class="clock" id="clockEl">—</div>
</header>

<!-- SCHEDULE RAIL -->
<div class="rail-wrap">
  <div class="rail" id="rail"></div>
</div>

<!-- NOW-ON-AIR -->
<div class="now-bar">
  <h2 id="chName">—</h2>
  <span class="ch-tag" id="chTag">—</span>
  <span class="type-tag" id="chType">—</span>
  <span class="next-up">Next: <span id="nextUp">—</span></span>
</div>

<!-- PLAYER STAGE -->
<div class="stage" id="stage">
  <iframe id="stageFrame" allow="autoplay; fullscreen" allowfullscreen></iframe>
  <div class="stage-loading" id="loader">
    <div class="spinner"></div>
    <p id="loaderLabel">Tuning in…</p>
  </div>
</div>

<!-- VIDEO NAV -->
<div class="video-nav" id="videoNav">
  <button class="vnav-btn" onclick="videoPrev()">← Prev</button>
  <span class="vnav-idx" id="vidIdx"></span>
  <button class="vnav-btn" onclick="videoNext()">Next →</button>
</div>

<!-- FOOTER -->
<footer class="footer">
  <span>G4E Movement Studio · Lithonia, GA</span>
  <div class="channel-dots" id="chDots"></div>
  <button class="embed-btn" onclick="copyEmbed()">⬡ Copy Embed</button>
</footer>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
//  CHANNEL DEFINITIONS
//  kind: 'player'  → embed one of your live STV player pages
//  kind: 'vimeo'   → shuffle through Vimeo IDs
// ══════════════════════════════════════════════════════════════
const CHANNELS = [
  {
    key:   'red',
    name:  'STV Red',
    tag:   'CH 1',
    type:  'Hip-Hop · R&B',
    kind:  'player',
    url:   'https://fairefaretravels.github.io/stvradiomeltdown/',
  },
  {
    key:   'gold',
    name:  'STV Gold',
    tag:   'CH 2',
    type:  'Elevated Sound',
    kind:  'player',
    url:   'https://fairefaretravels.github.io/stvradiomeltdown-Gold/',
  },
  {
    key:   'fit',
    name:  'STV Fit',
    tag:   'CH 3',
    type:  'Movement · Energy',
    kind:  'player',
    url:   'https://fairefaretravels.github.io/stvradiomeltdown-fit/',
  },
  {
    key:   'love',
    name:  'Love & Co.',
    tag:   'CH 4',
    type:  'Soul · Night Cruise',
    kind:  'player',
    url:   'https://fairefaretravels.github.io/stvradiomeltdown-loveandcompany/',
  },
  {
    key:   'film',
    name:  'Film / TV / EDU',
    tag:   'CH 5',
    type:  'Video · Vimeo',
    kind:  'vimeo',
    videos: [
      { id: '1201972455', title: 'STV Feature 1' },
      { id: '1201973030', title: 'STV Feature 2' },
      { id: '1201973029', title: 'STV Feature 3' },
    ]
  },
  {
    key:   'fashion',
    name:  'Fashion News',
    tag:   'CH 6',
    type:  'Video · Vimeo',
    kind:  'vimeo',
    videos: [
      { id: '1201452576', title: 'Fashion Report 1' },
      { id: '1201185045', title: 'Fashion Report 2' },
      // Add more Vimeo IDs here
    ]
  },
];

// ══════════════════════════════════════════════════════════════
//  HOURLY SCHEDULE  (Eastern Time, 0–23)
//  Set each hour to a channel key from above
// ══════════════════════════════════════════════════════════════
const SCHEDULE = {
   0: 'love',    1: 'love',    2: 'love',    3: 'love',
   4: 'love',    5: 'gold',    6: 'gold',    7: 'gold',
   8: 'fit',     9: 'fit',    10: 'film',   11: 'film',
  12: 'red',    13: 'red',    14: 'fashion', 15: 'fashion',
  16: 'fit',    17: 'fit',    18: 'red',    19: 'red',
  20: 'film',   21: 'fashion', 22: 'gold',   23: 'love',
};

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let activeKey    = null;
let shuffledVids = [];
let vidIdx       = 0;
let lastHour     = -1;

const chMap = Object.fromEntries(CHANNELS.map(c => [c.key, c]));

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Eastern hour helper
function etHour() {
  const et = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));
  return et.getHours();
}

// ══════════════════════════════════════════════════════════════
//  CLOCK
// ══════════════════════════════════════════════════════════════
function tickClock() {
  const et = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const h = et.getHours(), m = et.getMinutes(), s = et.getSeconds();
  const ampm = h >= 12 ? 'PM' : 'AM';
  const hh = h % 12 || 12;
  document.getElementById('clockEl').textContent =
    `${String(hh).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ET`;
  // auto-switch on the new hour
  if (m === 0 && s < 2 && h !== lastHour) tuneToScheduled();
}

// ══════════════════════════════════════════════════════════════
//  RAIL
// ══════════════════════════════════════════════════════════════
function buildRail() {
  const rail = document.getElementById('rail');
  rail.innerHTML = '';
  const curHour = etHour();
  for (let h = 0; h < 24; h++) {
    const key = SCHEDULE[h];
    const ch  = chMap[key];
    const ampm = h >= 12 ? 'PM' : 'AM';
    const hh   = h % 12 || 12;
    const div  = document.createElement('div');
    div.className = 'block' +
      (h === curHour ? ' now' : '') +
      (key === activeKey && h !== curHour ? ' tuned' : '');
    div.dataset.key = key;
    div.innerHTML = `<span class="bhr">${hh}${ampm}</span><span class="bname">${ch?.name ?? '—'}</span>`;
    div.onclick = () => tune(key);
    rail.appendChild(div);
  }
  // scroll current hour into view
  const nowEl = rail.querySelector('.now');
  if (nowEl) nowEl.scrollIntoView({ block: 'nearest', inline: 'center' });
}

function refreshRailHighlight() {
  document.querySelectorAll('#rail .block').forEach(b => {
    b.classList.toggle('tuned', b.dataset.key === activeKey && !b.classList.contains('now'));
  });
}

// ══════════════════════════════════════════════════════════════
//  CHANNEL DOTS (footer)
// ══════════════════════════════════════════════════════════════
function buildDots() {
  const wrap = document.getElementById('chDots');
  wrap.innerHTML = '';
  CHANNELS.forEach(ch => {
    const d = document.createElement('div');
    d.className = 'cdot' + (ch.key === activeKey ? ' active' : '');
    d.title = ch.name;
    d.dataset.key = ch.key;
    d.onclick = () => tune(ch.key);
    wrap.appendChild(d);
  });
}
function refreshDots() {
  document.querySelectorAll('.cdot').forEach(d => {
    d.classList.toggle('active', d.dataset.key === activeKey);
  });
}

// ══════════════════════════════════════════════════════════════
//  TUNER
// ══════════════════════════════════════════════════════════════
function tuneToScheduled() {
  lastHour = etHour();
  buildRail();
  tune(SCHEDULE[lastHour] ?? 'red');
}

function tune(key) {
  const ch = chMap[key];
  if (!ch) return;
  activeKey = key;

  // Header
  document.getElementById('chName').textContent = ch.name;
  document.getElementById('chTag').textContent  = ch.tag;
  document.getElementById('chType').textContent  = ch.type;

  // Next-up
  const nextHour = (etHour() + 1) % 24;
  const nextCh   = chMap[SCHEDULE[nextHour]];
  document.getElementById('nextUp').textContent = nextCh?.name ?? '—';

  refreshRailHighlight();
  refreshDots();

  showLoader(ch.name);

  if (ch.kind === 'player') {
    document.getElementById('videoNav').classList.remove('visible');
    setFrame(ch.url);
  } else {
    // vimeo
    shuffledVids = shuffle(ch.videos);
    vidIdx = 0;
    document.getElementById('videoNav').classList.add('visible');
    loadVimeo();
  }
}

function setFrame(src) {
  const frame = document.getElementById('stageFrame');
  frame.src = src;
  frame.onload = () => hideLoader();
  // fallback hide after 4s in case onload doesn't fire (cross-origin)
  setTimeout(hideLoader, 4000);
}

function loadVimeo() {
  const v = shuffledVids[vidIdx];
  document.getElementById('vidIdx').textContent = `${vidIdx + 1} / ${shuffledVids.length}  ·  ${v.title}`;
  setFrame(`https://player.vimeo.com/video/${v.id}?autoplay=1&title=0&byline=0&portrait=0&color=E8A020`);
}

function videoPrev() {
  vidIdx = (vidIdx - 1 + shuffledVids.length) % shuffledVids.length;
  loadVimeo();
}
function videoNext() {
  vidIdx = (vidIdx + 1) % shuffledVids.length;
  loadVimeo();
}

// ══════════════════════════════════════════════════════════════
//  LOADER OVERLAY
// ══════════════════════════════════════════════════════════════
function showLoader(label) {
  const el = document.getElementById('loader');
  document.getElementById('loaderLabel').textContent = `Tuning to ${label}…`;
  el.classList.remove('hidden');
}
function hideLoader() {
  document.getElementById('loader').classList.add('hidden');
}

// ══════════════════════════════════════════════════════════════
//  EMBED COPY
// ══════════════════════════════════════════════════════════════
function copyEmbed() {
  const url = window.location.href.split('?')[0];
  const code = `<iframe src="${url}" width="100%" height="700" frameborder="0" allow="autoplay; fullscreen" style="border-radius:10px; border:none;"></iframe>`;
  navigator.clipboard.writeText(code).then(() => {
    showToast('Embed code copied!');
  }).catch(() => {
    prompt('Copy embed code:', code);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
buildDots();
tuneToScheduled();
setInterval(tickClock, 1000);
tickClock();
</script>
</body>
</html>
